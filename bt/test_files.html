<!doctype html>
<meta charset="utf-8" />
<title>libtorrent websocket test</title>
<script src="libtorrent-webui.js"></script>
<script>
  /* global libtorrent_connection, file_fields */
  "use strict";

  var conn = null;

  var update_file_list = function (data) {
    if (typeof data === "string") {
      console.log("ERROR: " + data);
      return;
    }

    var files = data["files"];
    var tbody = document.getElementById("files").tBodies[0];
    var template = document.getElementById("file-row");

    // clear classes on all cells
    for (var i = 0; i < tbody.rows.length; ++i) {
      var cells = tbody.rows[i].cells;
      for (var j = 0; j < cells.length; ++j) cells[j].className = "";
    }

    for (i = 0; i < files.length; i++) {
      var f = files[i];
      var row = tbody.rows[i];
      if (!row) {
        row = template.content.firstElementChild.cloneNode(true);
        tbody.appendChild(row);
      }
      var set_cell = function (field, value) {
        var c = row.querySelector('[data-field="' + field + '"]');
        c.textContent = value;
        c.className = "updated";
      };

      if ("name" in f) {
        var name_cell = row.querySelector('[data-field="name"]');
        if (name_cell.childNodes.length == 0) {
          var a = document.createElement("a");
          a.appendChild(document.createTextNode(f["name"]));
          a.href = "/download/" + window.location.hash.substring(1) + "/" + i;
          name_cell.appendChild(a);
          name_cell.className = "updated";
        }
      }
      if ("size" in f) set_cell("size", f["size"]);
      if ("downloaded" in f) set_cell("downloaded", f["downloaded"]);
      if ("prio" in f) set_cell("prio", f["prio"]);
      if ("open-mode" in f) {
        let mode = [];
        const bits = f["open-mode"];
        if (bits & 0x01) mode.push("write-only");
        if (bits & 0x02) mode.push("read-write");
        if (bits & 0x04) mode.push("sparse");
        if (bits & 0x08) mode.push("no-atime");
        if (bits & 0x10) mode.push("random-access");
        if (bits & 0x40) mode.push("memory-mapped");
        set_cell("mode", mode.join(" "));
      }
    }
  };

  window.onload = function () {
    var url = "wss://" + window.location.host + "/bt/control";
    conn = new libtorrent_connection(url, function (state) {
      if (state != "OK") {
        console.log(state);
        return;
      }

      document.getElementById("headline").innerText =
        "Files for " + window.location.hash.substring(1);

      window.setInterval(function () {
        conn.get_file_updates(
          window.location.hash.substring(1),
          0,
          file_fields.flags |
            file_fields.name |
            file_fields.size |
            file_fields.downloaded |
            file_fields.priority |
            file_fields.open_mode,
          update_file_list,
        );
      }, 1000);
    });
  };
</script>
<style>
  .updated {
    background-color: #faa;
  }
</style>
<h1 id="headline"></h1>
<table id="files" border="1" style="border-collapse: collapse">
  <thead>
    <tr>
      <th>Name</th>
      <th>Size</th>
      <th>Downloaded</th>
      <th>Priority</th>
      <th>mode</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
<template id="file-row">
  <tr>
    <td data-field="name"></td>
    <td data-field="size"></td>
    <td data-field="downloaded"></td>
    <td data-field="prio"></td>
    <td data-field="mode"></td>
  </tr>
</template>
