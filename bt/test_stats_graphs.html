<!doctype html>
<meta charset="utf-8" />
<title>libtorrent websocket test</title>
<script src="libtorrent-webui.js"></script>
<script src="libtorrent-graph.js"></script>
<script>
  /* global libtorrent_connection, render_graph */
  "use strict";

  var conn = null;

  var first_time = new Date().getTime();

  var data = [];

  var all_stats = [];
  var all_names = [];

  var on_stats = function (updates) {
    if (typeof updates === "string") {
      console.log("ERROR: " + updates);
      return;
    }

    // Use seconds so render_graph()'s pixels_per_time_unit is literal.
    var now = (new Date().getTime() - first_time) / 1000;
    // Buffer retention boundary; older samples are spliced off.
    var oldest_kept = now - 500;

    var data_point = {};
    if (data.length > 0) {
      // if there is a previous data point
      // copy all values from it
      var last = data[data.length - 1];
      for (var i in last) {
        data_point[i] = last[i];
      }
    }

    data_point["time"] = now;

    for (var i in updates) {
      data_point[i] = updates[i];
    }
    data.push(data_point);

    // remove data points that are too old, except
    // keep one so that we can draw a line from there to
    // the next point within the window
    var prune = 0;
    while (prune < data.length && data[prune].time < oldest_kept) ++prune;
    if (prune > 1) data.splice(0, prune - 1);

    for (const name of all_names) {
      var defs = [{ name: name, color: "#e44" }];
      render_graph(name, data, defs, now, 5, "", "auto");
    }
  };

  window.onload = function () {
    var url = "wss://" + window.location.host + "/bt/control";
    conn = new libtorrent_connection(url, function (state) {
      if (state != "OK") {
        console.log(state);
        return;
      }

      conn.list_stats(function (stats) {
        var graphs = document.getElementById("graph_container");
        for (var s in stats) {
          graphs.innerHTML +=
            '<div style="display: inline-block; border:1px solid black;">' +
            s +
            '<br/><canvas id="' +
            s +
            '" width="300" height="200" style="width:300px;height:200px"></canvas></div>';
          all_stats.push(stats[s].id);
          all_names.push(s);
        }

        window.setInterval(function () {
          conn.get_stats(all_stats, on_stats);
        }, 2000);
      });
    });
  };
</script>
<body>
  <div id="graph_container"></div>
</body>
