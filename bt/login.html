<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>libtorrent webui - login</title>
    <style>
      :root {
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg-page: #fff;
        --bg-dialog: #fff;
        --bg-info: #f9f9f9;
        --text-primary: #000;
        --text-secondary: #555;
        --text-error: #c00;
        --border-medium: #ccc;
        --accent-focus: #6af;
        --accent-action: #4a7;
        --accent-action-hover: #5b8;
        --shadow-card: 0 4px 16px rgba(0, 0, 0, 0.15);
      }
      body {
        font-family: var(--font-sans);
        background: var(--bg-page);
        color: var(--text-primary);
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .login-form {
        background: var(--bg-dialog);
        padding: 2em 2.5em;
        border: 1px solid var(--border-medium);
        border-radius: 6px;
        box-shadow: var(--shadow-card);
        min-width: 280px;
      }
      .login-form h1 {
        margin: 0 0 1em 0;
        font-size: 1.2em;
        font-weight: normal;
        text-align: center;
      }
      .login-form label {
        display: block;
        margin-top: 0.8em;
        font-size: 0.9em;
        color: var(--text-secondary);
      }
      .login-form input[type="text"],
      .login-form input[type="password"] {
        width: 100%;
        padding: 0.5em;
        margin-top: 0.3em;
        background: var(--bg-page);
        color: var(--text-primary);
        border: 1px solid var(--border-medium);
        border-radius: 3px;
        font-size: 1em;
        box-sizing: border-box;
      }
      .login-form input[type="text"]:focus,
      .login-form input[type="password"]:focus {
        outline: none;
        border-color: var(--accent-focus);
      }
      .login-form button {
        margin-top: 1.5em;
        width: 100%;
        padding: 0.6em;
        background: var(--accent-action);
        color: #fff;
        border: none;
        border-radius: 3px;
        font-size: 1em;
        cursor: pointer;
      }
      .login-form button:hover {
        background: var(--accent-action-hover);
      }
      .login-form .error {
        margin-top: 1em;
        padding: 0.6em;
        background: var(--bg-info);
        color: var(--text-error);
        border: 1px solid var(--border-medium);
        border-radius: 3px;
        font-size: 0.9em;
        text-align: center;
      }
      dialog {
        background: var(--bg-dialog);
        color: var(--text-primary);
        border: 1px solid var(--border-medium);
        border-radius: 6px;
        box-shadow: var(--shadow-card);
        padding: 1.5em 2em;
        max-width: 90%;
        font-family: var(--font-sans);
      }
      dialog::backdrop {
        background: rgba(0, 0, 0, 0.4);
      }
      dialog p {
        margin: 0 0 1em 0;
        color: var(--text-error);
        text-align: center;
      }
      dialog button {
        width: 100%;
        padding: 0.6em;
        background: var(--accent-action);
        color: #fff;
        border: none;
        border-radius: 3px;
        font-size: 1em;
        cursor: pointer;
      }
      dialog button:hover {
        background: var(--accent-action-hover);
      }
    </style>
  </head>
  <body>
    <form
      class="login-form"
      method="POST"
      action="/login"
      enctype="application/x-www-form-urlencoded"
    >
      <h1>libtorrent webui</h1>
      <input type="hidden" name="csrf" value="__CSRF_TOKEN__" />
      <label for="username">Username</label>
      <input
        id="username"
        type="text"
        name="username"
        autocomplete="username"
        autofocus
        spellcheck="false"
        required
      />
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        name="password"
        autocomplete="current-password"
        required
      />
      <button type="submit">Sign in</button>
      <noscript>
        <div class="error">
          Login error messages require JavaScript. The form itself works without
          it.
        </div>
      </noscript>
    </form>
    <dialog id="login-error">
      <p id="login-error-text"></p>
      <form method="dialog">
        <button type="submit" autofocus>Dismiss</button>
      </form>
    </dialog>
    <script>
      "use strict";
      // textContent (not innerHTML) renders the URL value as plain text -
      // safe regardless of what is in the query string.
      const err = new URLSearchParams(location.search).get("error");
      if (err) {
        document.getElementById("login-error-text").textContent = err;
        document.getElementById("login-error").showModal();
        history.replaceState(null, "", location.pathname);
      }
    </script>
  </body>
</html>
