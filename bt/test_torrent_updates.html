<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>libtorrent websocket test</title>
    <script src="libtorrent-webui.js"></script>
    <script>
      /* global libtorrent_connection, fields */
      "use strict";

      var conn = null;

      var update_torrent_list = function (updates) {
        if (typeof updates === "string") {
          console.log("ERROR: " + updates);
          return;
        }

        // clear classes on all cells
        var table = document.getElementById("torrents").querySelector("tbody");
        var rows = table.rows;
        for (var i = 0; i < rows.length; ++i) {
          var r = rows[i];
          var cells = r.cells;
          for (var j = 0; j < cells.length; ++j) {
            cells[j].className = "";
          }
        }

        var removed_torrents = updates["removed"];
        for (const ih of removed_torrents) {
          var row = document.getElementById(ih);
          if (row) row.parentNode.removeChild(row);
        }

        const snapshot = updates["snapshot"];
        if (snapshot) {
          table.replaceChildren();
        }

        var modified = updates["updates"];
        var template = document.getElementById("torrent-row");
        for (var ih in modified) {
          var t = modified[ih];
          var row = document.getElementById(ih);

          if (row == null) {
            row = template.content.firstElementChild.cloneNode(true);
            row.id = ih;
            table.appendChild(row);
          }
          for (var field in t) {
            var cell = row.querySelector('[data-field="' + field + '"]');
            if (!cell) continue;
            cell.textContent = t[field];
            cell.className = "updated";
          }
          console.log(t);
        }
      };

      window.onload = function () {
        var url = "wss://" + window.location.host + "/bt/control";
        conn = new libtorrent_connection(url, function (state) {
          if (state != "OK") {
            console.log(state);
            return;
          }

          window.setInterval(function () {
            conn.get_updates(
              fields.name |
                fields.download_rate |
                fields.upload_rate |
                fields.connected_peers |
                fields.error |
                fields.progress |
                fields.flags |
                fields.state,
              update_torrent_list,
            );
          }, 1000);
        });
      };
    </script>
    <style>
      .updated {
        background-color: #faa;
      }
    </style>
  </head>
  <body>
    <table
      id="torrents"
      border="1"
      style="border-collapse: collapse; border-color: black"
    >
      <thead>
        <tr>
          <th>Name</th>
          <th>Progress</th>
          <th>Download rate</th>
          <th>Upload rate</th>
          <th>Peers</th>
          <th>Error</th>
          <th>flags</th>
          <th>state</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <template id="torrent-row">
      <tr>
        <td data-field="name"></td>
        <td data-field="progress"></td>
        <td data-field="download-rate"></td>
        <td data-field="upload-rate"></td>
        <td data-field="connected-peers"></td>
        <td data-field="error"></td>
        <td data-field="flags"></td>
        <td data-field="state"></td>
      </tr>
    </template>
  </body>
</html>
