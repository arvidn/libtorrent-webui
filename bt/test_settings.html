<!doctype html>
<meta charset="utf-8" />
<title>libtorrent websocket test</title>
<script src="libtorrent-webui.js"></script>
<script>
  /* global libtorrent_connection */
  "use strict";

  var conn = null;

  var update_settings_list = function (settings) {
    if (typeof settings === "string") {
      console.log("ERROR: " + settings);
      return;
    }

    var tbody = document.getElementById("settings").tBodies[0];
    var template = document.getElementById("settings-row");

    var req = [];
    for (const s of settings) {
      var row = template.content.firstElementChild.cloneNode(true);
      row.id = s.id;
      row.querySelector('[data-field="id"]').textContent = s.id;
      row.querySelector('[data-field="name"]').textContent = s.name;
      row.querySelector('[data-field="type"]').textContent = s.type;
      tbody.appendChild(row);
      req.push(s.id);
    }

    conn.get_settings(req, function (values) {
      if (typeof values === "string") {
        console.log("ERROR: " + settings);
        return;
      }

      for (var i = 0; i < req.length; ++i) {
        // find the row with this settings ID
        var row = document.getElementById(req[i]);
        var value_cell = row.querySelector('[data-field="value"]');

        // type
        var type = row.querySelector('[data-field="type"]').textContent;
        switch (type) {
          case "string":
            value_cell.innerHTML =
              '<input type="text" name="' +
              req[i] +
              '" value="' +
              values[i] +
              '" onkeypress="submit_on_enter(event, \'' +
              req[i] +
              "');\"/>";
            break;
          case "int":
            value_cell.innerHTML =
              '<input type="number" name="' +
              req[i] +
              '" value="' +
              values[i] +
              '" onkeypress="submit_on_enter(event, \'' +
              req[i] +
              "');\"/>";
            break;
          case "bool":
            value_cell.innerHTML =
              '<select id="dd-' +
              req[i] +
              '" onchange="submit(\'' +
              req[i] +
              "');\"><option>false</option><option>true</option></select>";
            document.getElementById("dd-" + req[i]).selectedIndex = values[i]
              ? 1
              : 0;
            break;
        }
      }
    });
  };

  // eslint-disable-next-line no-unused-vars -- called from inline onkeypress HTML attributes
  function submit_on_enter(e, settings_id) {
    if (e.keyCode === 13) {
      submit(settings_id);
    }
    return false;
  }

  function submit(settings_id) {
    var id = parseInt(settings_id);
    var row = document.getElementById(settings_id);
    var type = row.querySelector('[data-field="type"]').textContent;
    var value = row.querySelector('[data-field="value"]').childNodes[0];
    switch (type) {
      case "string":
        value = value.value;
        break;
      case "int":
        value = parseInt(value.value);
        break;
      case "bool":
        value = value.selectedIndex == 1;
        break;
    }
    var sett = {};
    sett[id] = value;
    conn.set_settings(sett, function () {});
  }

  window.onload = function () {
    var url = "wss://" + window.location.host + "/bt/control";
    conn = new libtorrent_connection(url, function (state) {
      if (state != "OK") {
        console.log(state);
        return;
      }

      conn.list_settings(update_settings_list);
    });
  };
</script>
<style>
  .updated {
    background-color: #faa;
  }
</style>
<table
  id="settings"
  border="1"
  style="border-collapse: collapse; border-color: black"
>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Type</th>
      <th>Value</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
<template id="settings-row">
  <tr>
    <td data-field="id"></td>
    <td data-field="name"></td>
    <td data-field="type"></td>
    <td data-field="value"></td>
  </tr>
</template>
