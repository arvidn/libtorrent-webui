<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>libtorrent websocket test</title>
    <script src="libtorrent-webui.js"></script>
    <script>
      /* global libtorrent_connection */
      "use strict";

      var conn = null;

      var all_stats = [];

      var stat_tables = function () {
        return [
          document.getElementById("stats1"),
          document.getElementById("stats2"),
          document.getElementById("stats3"),
          document.getElementById("stats4"),
          document.getElementById("stats5"),
        ];
      };

      var on_stats = function (updates) {
        if (typeof updates === "string") {
          console.log("ERROR: " + updates);
          return;
        }

        var tables = stat_tables();
        for (const t of tables) {
          var rows = t.tBodies[0].rows;
          for (var i = 0; i < rows.length; ++i) {
            rows[i].cells[0].className = "statValue";
          }
        }

        for (i in updates) {
          var row = document.getElementById(i);
          if (row == null) continue;
          row.cells[0].textContent = updates[i];
          row.cells[0].className = "updated";
        }
      };

      window.onload = function () {
        var url = "wss://" + window.location.host + "/bt/control";
        conn = new libtorrent_connection(url, function (state) {
          if (state != "OK") {
            console.log(state);
            return;
          }

          conn.list_stats(function (stats) {
            var tables = stat_tables();
            var template = document.getElementById("stat-row");
            var i = 0;
            for (var s in stats) {
              var row = template.content.firstElementChild.cloneNode(true);
              row.id = s;
              row.cells[1].textContent =
                s + (stats[s].type == 0 ? " (c)" : " (g)");
              tables[Math.floor(i / 60)].tBodies[0].appendChild(row);

              all_stats.push(stats[s].id);
              ++i;
            }

            window.setInterval(function () {
              conn.get_stats(all_stats, on_stats);
            }, 500);
          });
        });
      };
    </script>
    <style>
      .updated {
        background-color: #faa;
        text-align: right;
      }
      .statValue {
        text-align: right;
      }
      .statTable {
        vertical-align: top;
        border: none;
        border-collapse: collapse;
        border-color: black;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <table id="stats1" class="statTable">
      <thead>
        <tr>
          <th>Value</th>
          <th style="text-align: left">Metric</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <table id="stats2" class="statTable">
      <thead>
        <tr>
          <th>Value</th>
          <th style="text-align: left">Metric</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <table id="stats3" class="statTable">
      <thead>
        <tr>
          <th>Value</th>
          <th style="text-align: left">Metric</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <table id="stats4" class="statTable">
      <thead>
        <tr>
          <th>Value</th>
          <th style="text-align: left">Metric</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <table id="stats5" class="statTable">
      <thead>
        <tr>
          <th>Value</th>
          <th style="text-align: left">Metric</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <template id="stat-row">
      <tr>
        <td class="statValue">0</td>
        <td></td>
      </tr>
    </template>
  </body>
</html>
