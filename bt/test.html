<!DOCTYPE html>
<meta charset="utf-8" />
<title>libtorrent websocket test</title>

<script language="javascript" type="text/javascript" src="libtorrent-graph.js"></script>

<!-- TODO: factor out this script into a separate file from the HTML -->
<script language="javascript" type="text/javascript">

var conn = null;

// list of -> [ {time, ih1, ih2, ih3, ...}, ... ]
var torrent_rate = [];

var defs = [];

var first_time = new Date().getTime();

var state_names = ['checking', 'downloading-metadata', 'downloading', 'seeding'];

scale_si = function(value, unit)
{
	if (value < 0)
	{
		negative = '-'
		value = -value;
	}
	else
	{
		negative = ''
	}
	if (value >= 1000000000)
	{
		unit = 'G' + unit;
		value /= 1000000000;
	}
	else if (value >= 1000000)
	{
		unit = 'M' + unit;
		value /= 1000000;
	}
	else if (value >= 1000)
	{
		unit = 'k' + unit;
		value /= 1000;
	}
	else if (value >= 0)
	{
		// do nothing
		// return here since we don't want any decimal places in this case
		return negative + value + unit;
	}
	else if (value >= 0.001)
	{
		unit = 'm' + unit;
		value *= 1000;
	}
	else if (value >= 0.000001)
	{
		unit = 'u' + unit;
		value *= 1000000;
	}
	else if (value >= 0.000000001)
	{
		unit = 'n' + unit;
		value *= 1000000000;
	}
	return negative + value.toFixed(2) + unit;
}

redraw = function(updates)
{
	if (typeof(updates) === 'string')
	{
		console.log("ERROR: " + updates);
		return;
	}

	var table = document.getElementById('torrents').querySelector("tbody");

	var now = new Date().getTime() - first_time;

	// this is the start of the window to be graphed.
	// 60 seconds
	var start_time = now - 60 * 1000;

	// copy the last element and set its time to now
	if (torrent_rate.length > 0)
	{
		var last = torrent_rate[torrent_rate.length-1];
		var entry = {};
		for (i in last)
			entry[i] = last[i];
		entry.time = now;
		torrent_rate.push(entry);
	}
	else
	{
		torrent_rate.push({ time: now });
	}

	// remove data points older than 60 seconds, except
	// keep one so that we can draw a line from there to
	// the next point within the window
	var prune = 0;
	while (prune < torrent_rate.length && torrent_rate[prune].time < start_time)
		++prune;
	if (prune > 1) torrent_rate.splice(0, prune-1);

	for (ih in updates)
	{
		var t = updates[ih];
		if (ih == 'removed')
		{
			var removed_torrents = updates[ih];
			for (i in removed_torrents)
			{
				var row = document.getElementById(removed_torrents[i]);
				row.parentNode.removeChild(row);
			}
			continue;
		}

		var row = document.getElementById(ih);

		if (row == null)
		{
			var template = document.querySelector('#torrent-row').content.cloneNode(true);
			template.querySelector("tr").id = ih;
			table.appendChild(template);
			row = document.getElementById(ih);

			defs.push({ name: ih + 'u', color: '#e44'});
			defs.push({ name: ih + 'd', color: '#4e4'});
		}
		for (field in t)
		{
			if (field == 'download-rate') torrent_rate[torrent_rate.length-1][ih + 'd'] = t[field];
			if (field == 'upload-rate') torrent_rate[torrent_rate.length-1][ih + 'u'] = t[field];

			var cell = row.querySelector('#' + field);
			if (cell == null) continue;

			switch (field)
			{
				case 'progress':
					cell.setAttribute('width', (t[field] / 10000) + '%')
					if (t[field] == 1000000) cell.className = 'seeding-progress';
					else cell.className = 'downloading-progress';
					break;
				case 'name':
					cell.innerText = t[field];
					cell.setAttribute('href', 'test_files.html#' + ih);
					break;
				case 'state':
					cell.innerText = state_names[t[field]];
					break;
				case 'upload-rate':
				case 'download-rate':
					cell.innerText = scale_si(t[field], 'B/s');
					break;
				case 'total-uploaded':
				case 'total-downloaded':
					cell.innerText = scale_si(t[field], 'B');
					break;
				default:
					cell.innerText = t[field];
			}
		}
	}

	render_graph('graph', torrent_rate, defs, start_time, now, "B/s", 'auto', 1);

};

add_torrent = function() {

	var link_box = document.getElementById('magnet');
	conn.add_torrent(link_box.value, function(e) { console.log('added torrent: ' + e); } );
	link_box.value = '';
}

window.onload = function() {
	var url = 'wss://' + window.location.host + '/bt/control';
	conn = new libtorrent_connection(url, function(state)
	{
		if (state != "OK") {
			console.log(state);
			return;
		}

		window.setInterval(function()
		{
			conn.get_updates(fields.name | fields.download_rate | fields.upload_rate | fields.progress | fields.total_uploaded | fields.total_downloaded | fields.state, redraw);
		}, 500);

	});
};
</script>


<style>
.counter { text-align: right; }
.seeding-progress { background-color: #7f7; }
.downloading-progress { background-color: #aaf; }
</style>

<tbody></tbody>
</table>

<tr>
<td id="controls">
<a href="#" onclick="conn.start([this.parentNode.parentNode.id]); return false;">start</a>

</td>

<div style="position:absolute;" id="state"></div>
</td>

<td id="total-downloaded" class="counter"></td>
<td id="upload-rate" class="counter"></td>

</tr>
</template>
