<!doctype html>
<meta charset="utf-8" />
<title>libtorrent websocket test</title>
<script src="libtorrent-webui.js"></script>

<!-- TODO: factor out this script into a separate file from the HTML -->
<script>
  /* global libtorrent_connection, fields, render_graph */
  "use strict";

  var conn = null;

  var state_names = ["checking", "metadata", "downloading", "seeding"];

  var scale_si = function (value, unit) {
    var negative;
    if (value < 0) {
      negative = "-";
      value = -value;
    } else {
      negative = "";
    }
    if (value >= 1000000000) {
      unit = "G" + unit;
      value /= 1000000000;
    } else if (value >= 1000000) {
      unit = "M" + unit;
      value /= 1000000;
    } else if (value >= 1000) {
      unit = "k" + unit;
      value /= 1000;
    } else if (value >= 0) {
      // do nothing
      // return here since we don't want any decimal places in this case
      return negative + value + unit;
    } else if (value >= 0.001) {
      unit = "m" + unit;
      value *= 1000;
    } else if (value >= 0.000001) {
      unit = "u" + unit;
      value *= 1000000;
    } else if (value >= 0.000000001) {
      unit = "n" + unit;
      value *= 1000000000;
    }
    return negative + value.toFixed(2) + unit;
  };

  var redraw = function (updates) {
    if (typeof updates === "string") {
      console.log("ERROR: " + updates);
      return;
    }

    var table = document.getElementById("torrents").querySelector("tbody");

    var removed_torrents = updates["removed"];
    for (var i in removed_torrents) {
      var row = document.getElementById(removed_torrents[i]);
      row.parentNode.removeChild(row);
    }

    const snapshot = updates["snapshot"];
    if (snapshot) {
      table.replaceChildren();
    }

    var modified = updates["updates"];
    for (var ih in modified) {
      var t = modified[ih];

      var row = document.getElementById(ih);

      if (row == null) {
        var template = document
          .querySelector("#torrent-row")
          .content.cloneNode(true);
        template.querySelector("tr").id = ih;
        table.appendChild(template);
        row = document.getElementById(ih);
      }
      for (var field in t) {
        var cell = row.querySelector("#" + field);
        if (cell == null) continue;

        switch (field) {
          case "progress":
            cell.style.width = t[field] / 10000 + "%";
            if (t[field] == 1000000) cell.className = "seeding-progress";
            else cell.className = "downloading-progress";
            break;
          case "name":
            cell.innerText = t[field];
            cell.setAttribute("href", "test_files.html#" + ih);
            break;
          case "state":
            cell.innerText = state_names[t[field]];
            break;
          case "upload-rate":
          case "download-rate":
            cell.innerText = scale_si(t[field], "B/s");
            break;
          case "total-uploaded":
          case "total-downloaded":
            cell.innerText = scale_si(t[field], "B");
            break;
          default:
            cell.innerText = t[field];
        }
      }
    }

    setTimeout(get_torrent_updates, 300);
  };

  var add_torrent = function () {
    var link_box = document.getElementById("magnet");
    conn.add_torrent(link_box.value, function (e) {
      console.log("added torrent: " + e);
    });
    link_box.value = "";
  };

  var get_torrent_updates = function () {
    conn.get_updates(
      fields.name |
        fields.download_rate |
        fields.upload_rate |
        fields.progress |
        fields.total_uploaded |
        fields.total_downloaded |
        fields.state |
        fields.connected_peers,
      redraw,
    );
  };

  window.onload = function () {
    var url = "wss://" + window.location.host + "/bt/control";
    conn = new libtorrent_connection(url, function (state) {
      if (state != "OK") {
        console.log(state);
        return;
      }
      get_torrent_updates();
    });
  };
</script>

<style>
  .counter {
    text-align: right;
  }
  .seeding-progress {
    background-color: #7f7;
  }
  .downloading-progress {
    background-color: #aaf;
  }
</style>

<!-- STYLE TORRENT TABLE -->
<table
  id="torrents"
  border="1"
  style="border-collapse: collapse; border-color: black; table-layout: fixed"
>
  <thead>
    <tr>
      <td>controls</td>
      <td style="min-width: 20em">Name</td>
      <td style="width: 7em">Progress</td>
      <td style="width: 5em">Uploaded</td>
      <td style="width: 5em">Downloaded</td>
      <td>Up rate</td>
      <td>Down rate</td>
      <td>Peers</td>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<!-- STYLE TORRENT TABLE ROWS -->
<template id="torrent-row">
  <tr>
    <td id="controls">
      <a
        href="#"
        onclick="conn.start([this.parentNode.parentNode.id]); return false;"
        >start</a
      >
      <a
        href="#"
        onclick="conn.stop([this.parentNode.parentNode.id]); return false;"
        >stop</a
      >
    </td>
    <td><a href="test_files.html#" id="name"></a></td>
    <td style="position: relative">
      <div id="progress" style="height: 1em"></div>
      <div style="position: absolute; top: 0; left: 0" id="state"></div>
    </td>
    <td id="total-uploaded" class="counter"></td>
    <td id="total-downloaded" class="counter"></td>
    <td id="upload-rate" class="counter"></td>
    <td id="download-rate" class="counter"></td>
    <td id="connected-peers" class="counter"></td>
  </tr>
</template>
