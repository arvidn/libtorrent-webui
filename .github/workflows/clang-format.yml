name: clang-format

on:
  push:
    branches: [master]
  pull_request:

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Runs every hook defined in .pre-commit-config.yaml against every
      # tracked file.  clang-format exits non-zero (and prints a diff) if
      # any file would be reformatted, failing the job.
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files
